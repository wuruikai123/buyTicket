server:
  port: 8089

spring:
  web:
    cors:
      allowed-origins: "*"
      allowed-methods: "*"
      allowed-headers: "*"
      allow-credentials: true
  datasource:
    url: jdbc:mysql://localhost:3306/buy_ticket?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 060615
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

file:
  upload:
    path: uploads

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.buyticket.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

alipay:
  app-id: 2021006120699092
  merchant-private-key: ""
  alipay-public-key: ""
  notify-url: https://ai-yishuguan.com/api/v1/payment/alipay/notify
  return-url: https://ai-yishuguan.com/order-success
  gateway-url: https://openapi.alipay.com/gateway.do
  sign-type: RSA2
  charset: utf-8

aliyun:
  sms:
    enabled: true
    accessKeyId: YOUR_ACCESS_KEY_ID
    accessKeySecret: YOUR_ACCESS_KEY_SECRET
    signName: 元星河文化
    templateCode: SMS_501865326

# 汇付宝支付配置
huifu:
  merchant-id: "6666000183050701"
  product-id: "PAYUN"
  huifu-public-key: ""
  merchant-private-key: ""
  notify-url: "https://ai-yishuguan.com/api/v1/huifu-pay/notify"
  return-url: "https://ai-yishuguan.com/order-success"
  gateway-url: "https://paas.huifu.com"

logging:
  level:
    root: INFO
    com.buyticket: INFO
  file:
    name: /var/log/buyticket/application.log
    max-size: 100MB
    max-history: 30
